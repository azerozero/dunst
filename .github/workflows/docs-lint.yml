# Docs lint pipeline: markdownlint + lychee.
#
# Scoped to docs/** and README.md so broken links and Markdown regressions are
# caught before merge. Rust doctests (`cargo test --doc`) stay in the main CI.

name: Docs Lint

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "**.md"
      - ".markdownlint.json"
      - ".lycheeignore"
      - ".github/workflows/docs-lint.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "**.md"
      - ".markdownlint.json"
      - ".lycheeignore"
      - ".github/workflows/docs-lint.yml"

concurrency:
  group: docs-lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v23.2.0
        with:
          globs: |
            docs/**/*.md
            README.md
          config: .markdownlint.json

  lychee:
    name: lychee
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Restore lychee cache
        uses: actions/cache@v5
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-
      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --cache
            --max-cache-age 1d
            --no-progress
            --accept 200,204,206,301,302,303,307,308,403,429
            docs/**/*.md README.md
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
