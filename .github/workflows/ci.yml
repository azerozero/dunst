name: CI

on:
  merge_group:
  push:
    branches: [main]
    tags:
      - "v*"
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE*"
      - ".editorconfig"
      - ".gitignore"
      - ".gitattributes"
      - "**.txt"
      - "CODEOWNERS"
      - ".vscode/**"
  pull_request:
  workflow_dispatch:
    inputs:
      live_smoke_app:
        description: "App to target for the optional live smoke job"
        required: false
        default: "Notes"
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust checks
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --workspace --all-targets --locked

      - name: Doc tests
        run: cargo test --workspace --doc --locked

      - name: Rustdoc
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --locked

      - name: Build dunst-mcp
        run: cargo build --locked -p dunst-mcp

  linux-pure:
    name: Linux pure checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Test pure crates
        run: cargo test -p dunst-core -p dunst-graph -p dunst-vision --locked

  shell:
    name: Shell scripts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: ShellCheck
        run: shellcheck scripts/*.sh

  security:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-security-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-security-

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --version 0.22.1 --force

      - name: Audit dependencies
        run: cargo audit --deny warnings

  coverage:
    name: Coverage gate
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-coverage-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-coverage-

      - name: Install coverage tools
        run: |
          rustup component add llvm-tools-preview
          cargo install cargo-llvm-cov --locked --version 0.8.7 --force

      - name: Check line coverage
        run: cargo llvm-cov --workspace --all-targets --locked --fail-under-lines 40 --summary-only

  benchmarks:
    name: Benchmarks
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Graph pipeline benchmark
        run: cargo bench -p dunst-graph --features bench --bench pipeline -- --sample-size 10

  live-smoke:
    name: Live macOS smoke
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run live smoke
        run: scripts/smoke-live.sh "${{ inputs.live_smoke_app || 'Notes' }}"

  # =========================================================================
  # Release chain (tag push only): extract version → build macOS binaries →
  # GitHub Release → update Homebrew tap. Mirrors the grob pattern, adapted for
  # a macOS-only binary (no Linux/cross/container).
  # =========================================================================
  version:
    name: Extract version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - name: Read version from Cargo.toml
        id: ver
        run: |
          V=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=${V}" >> "$GITHUB_OUTPUT"
          echo "tag=v${V}" >> "$GITHUB_OUTPUT"
          echo "Cargo.toml version: ${V}"

  build:
    name: Build ${{ matrix.target }}
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [version, rust]
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      BINARY_NAME: dunst-mcp
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --locked --release -p dunst-mcp --target ${{ matrix.target }}
      - name: Package
        run: |
          VERSION="v${{ needs.version.outputs.version }}"
          ARCHIVE="${BINARY_NAME}-${VERSION}-${{ matrix.target }}.tar.gz"
          tar czf "${ARCHIVE}" \
            -C "target/${{ matrix.target }}/release" "${BINARY_NAME}" \
            -C "${GITHUB_WORKSPACE}" README.md LICENSE
          shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}-${{ github.sha }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256
          if-no-files-found: error
          compression-level: 9

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [version, build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # create GitHub Release
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Checksums
        run: |
          cd artifacts
          {
            echo "## SHA256 Checksums"
            echo '```'
            cat ./*.sha256
            echo '```'
          } > ../CHECKSUMS.md
      - name: Validate tag matches Cargo.toml
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/}"
          CARGO_VERSION="v${{ needs.version.outputs.version }}"
          if [[ "$TAG_VERSION" != "$CARGO_VERSION" && ! "$TAG_VERSION" =~ ^${CARGO_VERSION}- ]]; then
            echo "::error::Tag $TAG_VERSION does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi
      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ needs.version.outputs.version }}"
          PRERELEASE=""
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE="--prerelease"
          fi
          gh release create "$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$VERSION" \
            --generate-notes \
            --notes-file CHECKSUMS.md \
            $PRERELEASE \
            artifacts/*.tar.gz artifacts/*.sha256

  homebrew:
    name: Update Homebrew tap
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [version, release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Update formula
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
        run: |
          VERSION="v${{ needs.version.outputs.version }}"
          V="${VERSION#v}"

          # Hash the macOS tarballs from the GitHub Release (this job runs after
          # the release job, so the assets exist).
          for TARGET in aarch64-apple-darwin x86_64-apple-darwin; do
            URL="https://github.com/azerozero/dunst/releases/download/${VERSION}/dunst-mcp-${VERSION}-${TARGET}.tar.gz"
            SHA=$(curl -sSL "$URL" | sha256sum | cut -d' ' -f1)
            eval "SHA_${TARGET//-/_}=$SHA"
          done

          # macOS-only formula (dunst-mcp uses macOS Accessibility / CoreGraphics).
          cat > /tmp/dunst-mcp.rb << RUBY
          class DunstMcp < Formula
            desc "macOS GUI automation MCP server (Accessibility, OCR, vision)"
            homepage "https://github.com/azerozero/dunst"
            version "${V}"
            license "Apache-2.0"
            depends_on :macos

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/azerozero/dunst/releases/download/v#{version}/dunst-mcp-v#{version}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_aarch64_apple_darwin}"
              else
                url "https://github.com/azerozero/dunst/releases/download/v#{version}/dunst-mcp-v#{version}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_x86_64_apple_darwin}"
              end
            end

            def install
              bin.install "dunst-mcp"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/dunst-mcp --version")
            end
          end
          RUBY

          # Strip the heredoc indentation.
          sed -i 's/^          //' /tmp/dunst-mcp.rb

          # Clone the tap, update the formula, push.
          git clone "https://x-access-token:${GH_TOKEN}@github.com/azerozero/homebrew-tap.git" /tmp/tap
          cp /tmp/dunst-mcp.rb /tmp/tap/Formula/dunst-mcp.rb
          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dunst-mcp.rb
          git commit -m "dunst-mcp ${V}"
          git push

  homebrew-test:
    name: Test Homebrew install
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [version, homebrew]
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - name: Install via brew
        run: |
          brew install azerozero/tap/dunst-mcp
          dunst-mcp --version
